server:
  port: 8080

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: gateway-client
            client-secret: ${GATEWAY_CLIENT_SECRET}
            scope: openid, profile, email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            authorization-uri: ${KEYCLOAK_PUBLIC_URL:http://localhost:8085}/realms/microservices-realm/protocol/openid-connect/auth
            token-uri: ${KEYCLOAK_INTERNAL_URL:http://localhost:8085}/realms/microservices-realm/protocol/openid-connect/token
            jwk-set-uri: ${KEYCLOAK_INTERNAL_URL:http://localhost:8085}/realms/microservices-realm/protocol/openid-connect/certs
            user-info-uri: ${KEYCLOAK_INTERNAL_URL:http://localhost:8085}/realms/microservices-realm/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - TokenRelay=
          routes:
            - id: chat-service-route
              uri: ${CHAT_INTERNAL_URL:http://localhost:8082}
              predicates:
                - Path=/api/chat/**
            - id: user-service-route
              uri: ${USER_INTERNAL_URL:http://localhost:8081}
              predicates:
                - Path=/api/user/**
          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins: "${FRONTEND_URL:http://localhost:4200}"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true

app:
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  keycloak-issuer-uri: ${KEYCLOAK_PUBLIC_URL:http://localhost:8085}/realms/microservices-realm
