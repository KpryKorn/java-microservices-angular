services:
# --- BDD ----
  auth-db:
    image: postgres:16-alpine
    container_name: auth-database
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"

  chat-db:
    image: postgres:16-alpine
    container_name: chat-database
    environment:
      POSTGRES_USER: ${CHAT_DB_USER}
      POSTGRES_PASSWORD: ${CHAT_DB_PASSWORD}
      POSTGRES_DB: chat_db
    ports:
      - "5433:5432"

# --- MICROSERVICES ---
  auth-api:
    build:
      context: ./auth-service
    container_name: auth-microservice
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      AUTH_DB_URL: jdbc:postgresql://auth-db:5432/auth_db
    depends_on:
      - auth-db

  chat-api:
    build:
      context: ./chat-service
    container_name: chat-microservice
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      CHAT_DB_URL: jdbc:postgresql://chat-db:5432/chat_db
    depends_on:
      - chat-db
  
  gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_INTERNAL_URL: http://auth-api:8081
      CHAT_INTERNAL_URL: http://chat-api:8082
    depends_on:
      - auth-api