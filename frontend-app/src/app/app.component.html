<div>
  <p>Chat GWI Service : {{ chatGWIStatus() }}</p>

  @if (isAuthenticated() && currentUser()) {
    <p>Connecté en tant que : {{ currentUser()!.name }} ({{ currentUser()!.username }})</p>
  }

  @if (!isAuthenticated()) {
    <button
      (click)="login()"
      style="
        padding: 8px 16px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      "
    >
      Se connecter avec Keycloak
    </button>
  }
</div>

<router-outlet />
