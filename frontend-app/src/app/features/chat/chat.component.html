<main class="mx-auto max-w-xl px-6 py-12">
  <h1 class="mb-4 text-xl font-semibold text-gray-900">Espace chat</h1>

  @if (authService.currentUser(); as user) {
    <p class="mb-2 text-sm text-gray-700">
      Connecté en tant que <strong>{{ user.name }}</strong> ({{ user.username }} — {{ user.email }})
    </p>
  }

  <p class="text-sm text-gray-500">Statut chat-service : {{ chatStatus() }}</p>
</main>
