<main class="flex min-h-screen items-center justify-center bg-gray-50">
  <section
    class="w-full max-w-sm rounded-lg border border-gray-200 bg-white p-8 text-center shadow-sm"
  >
    <h1 class="mb-2 text-xl font-semibold text-gray-900">Connexion</h1>
    <p class="mb-6 text-sm text-gray-500">Connectez-vous pour accéder à votre espace.</p>

    <button
      type="button"
      (click)="login()"
      class="w-full rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700"
    >
      Se connecter avec Keycloak
    </button>
  </section>
</main>
